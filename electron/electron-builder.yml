appId: com.lacuna.app
productName: Lacuna
directories:
  output: release
files:
  - dist/**/*
  - electron/dist-electron/**/*
  - electron/assets/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/assets/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: placeholder
  repo: lacuna
